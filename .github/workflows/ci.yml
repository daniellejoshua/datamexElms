name: CI

on:
  push:
    branches: ["Curriculum", "main", "master"]
  pull_request:
    branches: ["Curriculum", "main", "master"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    # Using SQLite for tests to avoid external DB/network flakiness in CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, pdo_mysql, tokenizer, xml, curl, dom, gd, zip
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install JS dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE="$(pwd)"/database/database.sqlite" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

      - name: Create SQLite database file
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --compact

      - name: Build frontend assets
        run: npm run build

      - name: Check code style (Pint)
        run: ./vendor/bin/pint --test
