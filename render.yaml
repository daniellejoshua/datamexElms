services:
  - type: web
    name: datamex-elms-web
    runtime: php
    plan: free
    branch: Curriculum
    preDeployCommand: |
      php artisan migrate --force
      php artisan storage:link || true
      php artisan config:cache
      php artisan route:cache
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DATABASE_URL
        sync: false
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: no-reply@datamex-elms.local
      - key: MAIL_FROM_NAME
        value: Datamex ELMS
      - key: BROADCAST_CONNECTION
        value: log
      - key: LOG_LEVEL
        value: info
    autoDeploy: true
